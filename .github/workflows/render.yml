name: Verify Scenes

on:
  push:
    paths:
      - "scenes/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "scenes/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check scenes/ scripts/

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check all Python files
        run: |
          shopt -s nullglob
          files=(scenes/*.py scripts/*.py)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Python files found — skipping"
            exit 0
          fi
          status=0
          for f in "${files[@]}"; do
            if ! python -m py_compile "$f" 2>&1; then
              echo "FAIL: $f"
              status=1
            fi
          done
          exit $status
