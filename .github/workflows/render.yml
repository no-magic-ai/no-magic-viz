name: Render Scenes

on:
  push:
    paths:
      - "scenes/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "scenes/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      scene:
        description: "Scene to render (blank = all)"
        required: false
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check scenes/

  render-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev ffmpeg
          pip install manim
      - name: Syntax check all scenes
        run: |
          shopt -s nullglob
          files=(scenes/scene_*.py)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No scene files found — skipping syntax check"
            exit 0
          fi
          for scene in "${files[@]}"; do
            python -m py_compile "$scene" || exit 1
          done
